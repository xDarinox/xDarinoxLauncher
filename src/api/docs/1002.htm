<script type='module'>
import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js'
import Element from '../../lib/classes/Element.js'
import Utils from '../../lib/classes/Utils.js'

let codeString = Utils.codeToString(() => {
// MarkDown код

// Создание текстовой ссылки
[текст](URL)

// Создание изображения
![описание](URL)
})

let m_mdView = new Element().getElementByID('_api-view-markdown')
m_mdView.setMouseScroll(false, true)
m_mdView.setHTML(marked.parse(fmt("%s\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n\n%s\n%s\n%s\n%s\n%s\n\n%s",
    '### Что такое MarkDown?',
    '**Markdown** — это легкий язык разметки, созданный для форматирования текста с помощью простых символов клавиатуры (решетки, звездочки и т.д.). Он позволяет создавать структурированные документы (заголовки, списки, жирный шрифт), которые легко читаются в исходном виде и преобразуются в HTML. Основная цель — удобство написания, высокая читаемость и простота.', 
    '### Основные особенности и преимущества',
    '- _Легкость чтения:_ Исходный файл выглядит как обычный текст, а не как код;',
    '- _Скорость:_ Позволяет форматировать текст, не отрываясь от клавиатуры для использования мыши;',
    '- _Портативность:_ Markdown-файлы — это простые текстовые файлы (.md), которые откроются на любом устройстве;',
    '- _Конвертация:_ Легко преобразуется в HTML, PDF, Word и другие форматы.;',
    '### Основные элементы синтаксиса',
    '- **Заголовки:** от `#` и до `######`',
    '- **Жирный текст:**  `**текст**` -> **текст**.',
    '- **Курсив:** `*текст*` -> *текст*.',
    '- **Списки:** `-` или `*` для маркированных списков, `1.` для нумерованных.',
    '- **Ссылка:** `[текст](ссылка)`',
    '- **Изображение:** `![описание](ссылка)`',
    '```md ' + codeString + '```',
    '### Примеры',
    '- **Этот текст жирный** `**Этот текст жирный**`',
    '- *Этот текст курсивный* `*Этот текст курсивный*`',
    '- ~Этот текст зачеркнутый~ `~Этот текст зачеркнутый~`',
    '- ***Этот текст жирный и курсивный*** `***Этот текст жирный и курсивный***`',
    '> Это цитата `> Это цитата`',
    '[Это ссылка]() `[Это ссылка](URL)`'
)))
</script>
